name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build
        run: wails3 build

      - name: Package
        run: |
          cd bin
          zip dotoken-darwin.zip dotoken
          shasum -a 256 dotoken-darwin.zip > dotoken-darwin.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/dotoken-darwin.zip
            bin/dotoken-darwin.sha256
          generate_release_notes: true
