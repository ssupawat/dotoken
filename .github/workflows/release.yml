name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Prepare build assets
        run: cp assets/appicon.png build/appicon.png

      - name: Build
        run: wails3 build

      - name: Package .app bundle
        run: |
          VERSION=$(cat VERSION)
          mkdir -p DoToken.app/Contents/MacOS
          cp bin/dotoken DoToken.app/Contents/MacOS/dotoken
          mkdir -p DoToken.app/Contents/Resources
          cp build/appicon.png DoToken.app/Contents/Resources/appicon.png
          cat > DoToken.app/Contents/Info.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>dotoken</string>
            <key>CFBundleIdentifier</key>
            <string>com.dotoken.app</string>
            <key>CFBundleName</key>
            <string>DoToken</string>
            <key>CFBundleDisplayName</key>
            <string>DoToken</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSUIElement</key>
            <true/>
            <key>CFBundleIconFile</key>
            <string>appicon</string>
          </dict>
          </plist>
          PLIST
          zip -r dotoken-darwin.zip DoToken.app
          shasum -a 256 dotoken-darwin.zip > dotoken-darwin.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dotoken-darwin.zip
            dotoken-darwin.sha256
          generate_release_notes: true
